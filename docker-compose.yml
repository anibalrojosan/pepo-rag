services:
  db:
    image: pgvector/pgvector:pg16
    container_name: peporag-db
    restart: always
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s
  backend:
    container_name: peporag-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT}:8000"
    env_file:
      - .env
    volumes:
      - ./backend/app:/app/app
      - ./backend/scripts:/app/scripts
    depends_on:
      - db

  frontend:
    container_name: peporag-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT}:8501"
    env_file:
      - .env
    volumes:
      - ./frontend/app.py:/app/app.py
    depends_on:
      - backend

volumes:
  postgres_data:
